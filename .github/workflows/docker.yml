name: Docker

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, for example 1.5.0 or v1.5.0
        required: true
        default: "1.5.1"
      ref:
        description: Git ref to build
        required: true
        default: "v1.5.1"
      latest:
        description: Also publish latest
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: chenbin3625/opensync

jobs:
  build:
    name: Build and publish image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}

      - name: Prepare release values
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            version="${{ github.event.release.tag_name }}"
            if [ "${{ github.event.release.prerelease }}" = "true" ]; then
              latest="false"
            else
              latest="true"
            fi
          else
            version="${{ inputs.version }}"
            latest="${{ inputs.latest }}"
          fi

          version="${version#v}"

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must look like 1.5.0 or v1.5.0."
            exit 1
          fi

          minor="${version%.*}"
          image="${REGISTRY}/${IMAGE_NAME}"

          {
            echo "tags<<EOF"
            echo "$image:$version"
            echo "$image:$minor"
            if [ "$latest" = "true" ]; then
              echo "$image:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.release.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
